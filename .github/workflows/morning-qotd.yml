# Morning QOTD push — "☀️ Today's Grind is ready"
#
# Why GitHub Actions and not a Vercel cron: both Vercel Hobby cron slots are
# taken (weekly-digest Mondays + the 6pm-PT daily reminder). This workflow is
# the third scheduler, hitting the same endpoint with ?mode=qotd.
#
# ONE-TIME SETUP (Coach): add the CRON_SECRET repo secret —
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name: CRON_SECRET, Value: same as the Vercel env var (in your Notes app).
# Until the secret exists, runs fail with 401 and nothing is sent.
#
# Test anytime from the Actions tab → "Morning QOTD push" → Run workflow.
#
# Timing: 13:00 UTC = 6:00am PDT (summer) / 5:00am PST (winter). GitHub cron
# is UTC-only and does NOT follow DST — to hold 6am year-round, change this to
# "0 14 * * *" when PST begins (~early Nov) and back to "0 13 * * *" at PDT
# (~mid-Mar). GitHub cron can drift up to ~15 min at busy times — fine here.
name: Morning QOTD push

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  knock:
    runs-on: ubuntu-latest
    steps:
      - name: Send morning quote push
        run: |
          # Print the HTTP status + response body (no secrets in either) so a
          # failure reads "HTTP 401" instead of curl's opaque "exit code 22".
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            "https://www.mygrindapp.com/api/cron/daily-reminder?mode=qotd" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"
          cat /tmp/resp.txt; echo
          if [ "$code" != "200" ]; then
            echo "::error::Push endpoint returned HTTP $code — if 401, the CRON_SECRET repo secret doesn't match Vercel's."
            exit 1
          fi
