<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>MyGrind — Quote of the Day card renderer</title>
<!--
  QOTD card renderer for MyGrind social posts. Rebuilt 2026-06-04, in the repo
  (GitHub-backed) so it cannot be lost again.

  Design rules (Coach feedback 2026-06-04): big logo, NO dash, NO salesy footer
  or URL, clean human flow, no special characters. The quote carries the message;
  the brand is present but never sells.

  Usage (driven by scripts/build_qotd.py):
    /qotd-story?q=<quote>&a=<author>&format=story|feed
  Fixed-size, static (no animation) so a headless-Chrome screenshot is clean:
    story = 1080x1920   feed = 1080x1350
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#C9A84C; --gold-light:#E0BC60; --gold-bright:#FFD874; --gold-dark:#8F7A36;
    --black:#181614; --white:#F5F0EB; --light:#D4C8BC; --grey:#A89880;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--black)}
  .card{
    position:relative; overflow:hidden;
    width:1080px; height:1920px;
    background:var(--black); color:var(--white);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:150px 104px;
    font-family:'Barlow',sans-serif;
  }
  .card.feed{ height:1350px; padding:104px 104px; }

  /* warm, quiet atmosphere — never loud */
  .bg{position:absolute; inset:0; pointer-events:none; z-index:0}
  .bg-diamond{background:repeating-linear-gradient(45deg, transparent 0 33px, rgba(201,168,76,.035) 33px 34px)}
  .bg-glow{background:radial-gradient(1200px 1000px at 50% 34%, rgba(201,168,76,.15), rgba(201,168,76,0) 62%)}
  .bg-vignette{background:radial-gradient(130% 120% at 50% 46%, transparent 50%, rgba(0,0,0,.82) 100%)}

  .wrap{position:relative; z-index:1; width:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center}

  .logo{width:620px; height:auto; margin-bottom:104px;
    filter:drop-shadow(0 8px 34px rgba(201,168,76,.22))}
  .card.feed .logo{width:520px; margin-bottom:74px}

  .quote{font-family:'Barlow Condensed',sans-serif; font-weight:600; color:var(--white);
    text-align:center; line-height:1.3; letter-spacing:.3px; max-width:900px;
    text-wrap:balance}
  .rule{width:96px; height:3px; margin:56px 0 34px;
    background:linear-gradient(90deg, transparent, var(--gold-bright), transparent)}
  .card.feed .rule{margin:44px 0 28px}
  .author{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px;
    letter-spacing:7px; text-transform:uppercase; color:var(--gold)}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="bg bg-diamond"></div>
    <div class="bg bg-glow"></div>
    <div class="bg bg-vignette"></div>
    <div class="wrap">
      <img class="logo" src="assets/logo.png" alt="MyGrind" id="logo">
      <div class="quote" id="quote">The grind is not a moment. It is a decision you make every morning.</div>
      <div class="rule"></div>
      <div class="author" id="author">The Grind</div>
    </div>
  </div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  function get(k,d){ var v = params.get(k); return (v===null||v==="") ? d : v; }

  var card   = document.getElementById('card');
  var format = (get('format','story')||'story').toLowerCase();
  if(format === 'feed') card.classList.add('feed');

  var quoteText = get('q','The grind is not a moment. It is a decision you make every morning.');
  var author    = get('a','The Grind');

  var qEl = document.getElementById('quote');
  qEl.textContent = quoteText;                 // textContent = no HTML injection, plain text
  document.getElementById('author').textContent = author;  // no dash, no special characters

  // auto-fit: start by length, then shrink so nothing overflows — long and short both balance
  var len = quoteText.length;
  var start = (format === 'feed') ? 74 : 86;
  if(len > 50)  start = (format==='feed') ? 62 : 72;
  if(len > 95)  start = (format==='feed') ? 50 : 58;
  if(len > 150) start = (format==='feed') ? 42 : 48;
  if(len > 200) start = (format==='feed') ? 36 : 42;

  var maxH = (format === 'feed') ? 470 : 660;  // px of vertical room for the quote
  function fit(){
    var size = start; qEl.style.fontSize = size + 'px';
    var guard = 0;
    while(qEl.scrollHeight > maxH && size > 28 && guard < 90){ size -= 2; qEl.style.fontSize = size + 'px'; guard++; }
  }
  fit();

  function ready(){ document.documentElement.setAttribute('data-qotd-ready','1'); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ fit(); ready(); }); }
  else { ready(); }
})();
</script>
</body>
</html>
